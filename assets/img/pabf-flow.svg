<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1540 720" role="img" aria-labelledby="title desc">
  <title id="title">PAB-F algorithm flowchart</title>
  <desc id="desc">Flowchart of PAB-F: context construction, safe action filtering, Thompson sampling over factorized memory-tool-style actions, execution, feedback, Bayesian update, and preference promotion.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#49647a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .canvas { fill: #f6f9fc; }
      .node { fill: #ffffff; stroke: #cad7e3; stroke-width: 2; filter: url(#shadow); }
      .node-accent { fill: #e6fffb; stroke: #35b8aa; stroke-width: 2; filter: url(#shadow); }
      .decision { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; filter: url(#shadow); }
      .label { fill: #102a43; font: 600 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #526b82; font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .edge { fill: none; stroke: #49647a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #7a8da0; stroke-width: 2.25; stroke-dasharray: 6 7; marker-end: url(#arrow); }
      .tag { fill: #102a43; font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .06em; }
      .badge { fill: #dff7f4; stroke: #9adbd3; }
    </style>
  </defs>
  <rect class="canvas" width="1540" height="720" rx="28"/>
  <text x="60" y="46" class="tag">PAB-F ONLINE PERSONALIZATION LOOP</text>

  <g id="a" transform="translate(46 76)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="34">User request X<tspan baseline-shift="sub">t</tspan></text>
    <text class="small" x="22" y="60">History H<tspan baseline-shift="sub">t-1</tspan></text>
    <text class="small" x="22" y="82">Onboarding Q</text>
  </g>
  <g id="b" transform="translate(392 76)">
    <rect class="node-accent" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="42">Context constructor</text>
    <text class="small" x="22" y="68">Psi(X<tspan baseline-shift="sub">t</tspan>, H<tspan baseline-shift="sub">t-1</tspan>, Q)</text>
  </g>
  <g id="c" transform="translate(738 76)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="34">Safe action filter</text>
    <text class="small" x="22" y="60">A<tspan baseline-shift="sub">t</tspan> = A<tspan baseline-shift="sub">safe</tspan>(C<tspan baseline-shift="sub">t</tspan>, Q<tspan baseline-shift="super">hard</tspan>)</text>
    <text class="small" x="22" y="82">permissions, tools, risk</text>
  </g>
  <g id="d" transform="translate(1084 76)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="42">Recover posterior</text>
    <text class="small" x="22" y="68">mu<tspan baseline-shift="sub">t</tspan>, Sigma<tspan baseline-shift="sub">t</tspan></text>
  </g>

  <g id="e" transform="translate(46 238)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="42">Sample residual taste</text>
    <text class="small" x="22" y="68">theta~ from N(mu<tspan baseline-shift="sub">t</tspan>, Sigma<tspan baseline-shift="sub">t</tspan>)</text>
  </g>
  <g id="f" transform="translate(392 238)">
    <rect class="node-accent" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="36">Score actions</text>
    <text class="small" x="22" y="62">factorized a = (m, tau, s)</text>
    <text class="small" x="22" y="84">memory, tool, style</text>
  </g>
  <g id="g" transform="translate(738 238)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="34">Choose argmax</text>
    <text class="small" x="22" y="60">b(C,a) + phi(C,a)^T theta~</text>
    <text class="small" x="22" y="82">minus lambda cost(C,a)</text>
  </g>
  <g id="h" transform="translate(1084 238)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="34">Host agent executes</text>
    <text class="small" x="22" y="60">memory, tool, clarify,</text>
    <text class="small" x="22" y="82">or respond policy</text>
  </g>

  <g id="i" transform="translate(46 400)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="42">Observe feedback</text>
    <text class="small" x="22" y="68">y<tspan baseline-shift="sub">t</tspan> in [-1, 1]</text>
  </g>
  <g id="j" transform="translate(392 400)">
    <rect class="node" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="34">Residual reward</text>
    <text class="small" x="22" y="60">r<tspan baseline-shift="sub">t</tspan> = y<tspan baseline-shift="sub">t</tspan> - b(C,a<tspan baseline-shift="sub">t</tspan>)</text>
    <text class="small" x="22" y="82">+ lambda cost(C,a<tspan baseline-shift="sub">t</tspan>)</text>
  </g>
  <g id="k" transform="translate(738 400)">
    <rect class="node-accent" width="288" height="96" rx="18"/>
    <text class="label" x="22" y="42">Bayesian update</text>
    <text class="small" x="22" y="68">Lambda, h, mu, Sigma</text>
  </g>
  <g id="l" transform="translate(1084 392)">
    <path class="decision" d="M144 0 L288 60 L144 120 L0 60 Z"/>
    <text class="label" text-anchor="middle" x="144" y="50">Confidence &gt;= rho</text>
    <text class="small" text-anchor="middle" x="144" y="76">and evidence &gt;= n_min?</text>
  </g>

  <g id="m" transform="translate(738 578)">
    <rect class="node" width="288" height="92" rx="18"/>
    <text class="label" x="22" y="34">Promote preference</text>
    <text class="small" x="22" y="60">write stable signal to</text>
    <text class="small" x="22" y="80">memory or prompt policy</text>
  </g>
  <g id="n" transform="translate(1084 578)">
    <rect class="node" width="288" height="92" rx="18"/>
    <text class="label" x="22" y="44">Continue</text>
    <text class="small" x="22" y="68">next interaction loop</text>
  </g>

  <path class="edge" d="M334 124 H392"/>
  <path class="edge" d="M680 124 H738"/>
  <path class="edge" d="M1026 124 H1084"/>
  <path class="edge" d="M1228 172 C1228 210 180 198 180 238"/>
  <path class="edge" d="M334 286 H392"/>
  <path class="edge" d="M680 286 H738"/>
  <path class="edge" d="M1026 286 H1084"/>
  <path class="edge" d="M1228 334 C1228 374 180 360 180 400"/>
  <path class="edge" d="M334 448 H392"/>
  <path class="edge" d="M680 448 H738"/>
  <path class="edge" d="M1026 448 H1084"/>
  <path class="edge" d="M1228 512 V578"/>
  <path class="edge" d="M1084 638 H1026"/>
  <path class="edge" d="M1228 670 C1228 704 536 704 536 172"/>

  <g transform="translate(1205 540)">
    <rect class="badge" width="46" height="24" rx="12"/>
    <text class="tag" text-anchor="middle" x="23" y="17">NO</text>
  </g>
  <g transform="translate(1010 548)">
    <rect class="badge" width="52" height="24" rx="12"/>
    <text class="tag" text-anchor="middle" x="26" y="17">YES</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1780 310" role="img" aria-labelledby="title desc">
  <title id="title">PABLO algorithm flowchart</title>
  <desc id="desc">A horizontal PABLO flowchart: build context, apply deterministic constraints, select a factorized action, execute the host agent, observe partial feedback, and update a per-user posterior.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#49647a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .canvas { fill: #f6f9fc; }
      .node { fill: #ffffff; stroke: #cad7e3; stroke-width: 2; filter: url(#shadow); }
      .node-accent { fill: #e6fffb; stroke: #35b8aa; stroke-width: 2; filter: url(#shadow); }
      .label { fill: #102a43; font: 700 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #526b82; font: 500 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .edge { fill: none; stroke: #49647a; stroke-width: 3; marker-end: url(#arrow); }
      .tag { fill: #0f6f69; font: 800 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .08em; }
      .step { fill: #0f6f69; font: 800 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .step-ring { fill: #e6fffb; stroke: #9adbd3; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="canvas" width="1780" height="310" rx="24"/>
  <text x="46" y="44" class="tag">PABLO ONLINE PERSONALIZATION LOOP</text>

  <g transform="translate(44 82)">
    <rect class="node" width="218" height="150" rx="16"/>
    <circle class="step-ring" cx="28" cy="28" r="16"/>
    <text class="step" text-anchor="middle" x="28" y="34">1</text>
    <text class="label" x="24" y="82">Build context</text>
    <text class="small" x="24" y="112">request + history</text>
  </g>
  <g transform="translate(320 82)">
    <rect class="node" width="218" height="150" rx="16"/>
    <circle class="step-ring" cx="28" cy="28" r="16"/>
    <text class="step" text-anchor="middle" x="28" y="34">2</text>
    <text class="label" x="24" y="76">Apply constraints</text>
    <text class="small" x="24" y="106">safety + mandatory</text>
    <text class="small" x="24" y="130">confirmation</text>
  </g>
  <g transform="translate(596 82)">
    <rect class="node-accent" width="250" height="150" rx="16"/>
    <circle class="step-ring" cx="28" cy="28" r="16"/>
    <text class="step" text-anchor="middle" x="28" y="34">3</text>
    <text class="label" x="24" y="76">Select action</text>
    <text class="small" x="24" y="106">memory · acquisition</text>
    <text class="small" x="24" y="130">presentation · TS</text>
  </g>
  <g transform="translate(904 82)">
    <rect class="node" width="218" height="150" rx="16"/>
    <circle class="step-ring" cx="28" cy="28" r="16"/>
    <text class="step" text-anchor="middle" x="28" y="34">4</text>
    <text class="label" x="24" y="82">Execute agent</text>
    <text class="small" x="24" y="112">retrieve, acquire, respond</text>
  </g>
  <g transform="translate(1180 82)">
    <rect class="node" width="218" height="150" rx="16"/>
    <circle class="step-ring" cx="28" cy="28" r="16"/>
    <text class="step" text-anchor="middle" x="28" y="34">5</text>
    <text class="label" x="24" y="82">Observe feedback</text>
    <text class="small" x="24" y="112">partial reward signal</text>
  </g>
  <g transform="translate(1456 82)">
    <rect class="node-accent" width="280" height="150" rx="16"/>
    <circle class="step-ring" cx="28" cy="28" r="16"/>
    <text class="step" text-anchor="middle" x="28" y="34">6</text>
    <text class="label" x="24" y="76">Update posterior</text>
    <text class="small" x="24" y="106">per-user residual</text>
    <text class="small" x="24" y="130">preference model</text>
  </g>

  <path class="edge" d="M262 157 H320"/>
  <path class="edge" d="M538 157 H596"/>
  <path class="edge" d="M846 157 H904"/>
  <path class="edge" d="M1122 157 H1180"/>
  <path class="edge" d="M1398 157 H1456"/>
</svg>
